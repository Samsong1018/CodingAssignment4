<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Collection</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato&display=swap">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Lato', sans-serif;
        background-color: #f5f0e8;
        color: #333;
        margin: 0;
        padding: 0;
      }

      header {
        background-color: #8B4513;
        color: white;
        text-align: center;
        padding: 40px 20px;
      }

      header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        margin: 0 0 8px;
      }

      header p {
        font-style: italic;
        color: #f5deb3;
        margin: 0;
        font-size: 16px;
      }

      main {
        max-width: 900px;
        margin: 48px auto;
        padding: 0 24px;
      }

      h2.section-title {
        font-family: 'Playfair Display', serif;
        color: #8B4513;
        font-size: 24px;
        margin: 0 0 24px;
        border-bottom: 2px solid #8B4513;
        padding-bottom: 8px;
      }

      .recipe-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 28px;
      }

      .recipe-card {
        background: white;
        border: 1px solid #ddd;
        width: 260px;
        overflow: hidden;
      }

      .recipe-card img {
        width: 100%;
        height: 175px;
        object-fit: cover;
        display: block;
      }

      .card-body {
        padding: 16px 18px 20px;
      }

      .card-body h3 {
        font-family: 'Playfair Display', serif;
        color: #8B4513;
        font-size: 20px;
        margin: 0 0 4px;
      }

      .contributor {
        font-size: 13px;
        color: #777;
        margin: 0 0 16px;
      }

      .card-body a {
        display: inline-block;
        background-color: #8B4513;
        color: white;
        text-decoration: none;
        padding: 8px 18px;
        font-size: 14px;
      }

      .card-body a:hover {
        background-color: #6b3410;
      }

      footer {
        background-color: #333;
        color: #f5deb3;
        text-align: center;
        padding: 20px;
        font-size: 14px;
        margin-top: 60px;
      }

      footer p { margin: 4px 0; }

      footer a {
        color: #f5deb3;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>

    <header>
      <h1>Recipe Collection</h1>
      <p>Homemade recipes from our team</p>
    </header>

    <main>
      <h2 class="section-title">Our Recipes</h2>
      <div class="recipe-grid">

        <div class="recipe-card">
          <img src="recipes/images/flan.png" alt="Classic Flan">
          <div class="card-body">
            <h3>Classic Flan</h3>
            <p class="contributor">by Amos Horne</p>
            <a href="recipes/Flan.html">Classic Flan</a>
          </div>
        </div>

      </div>
    </main>

    <footer>
      <p>This page created as academic activity only</p>
      <p><a href="https://www.bellevuecollege.edu" target="_blank">Bellevue College</a></p>
    </footer>

  </body>
</html>
